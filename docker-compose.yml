services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "45715:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  shard1:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - SHARD_NAME=shard1
    depends_on:
      redis:
        condition: service_started
      broker:
        condition: service_healthy

  shard2:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - SHARD_NAME=shard2
    depends_on:
      redis:
        condition: service_started
      broker:
        condition: service_healthy

  shard3:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - SHARD_NAME=shard3
    depends_on:
      redis:
        condition: service_started
      broker:
        condition: service_healthy

  shard4:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - SHARD_NAME=shard4
    depends_on:
      redis:
        condition: service_started
      broker:
        condition: service_healthy

      
  router:
    build:
      context: .
      dockerfile: ./router/Dockerfile
    ports:
      - "9000:9000"
    environment:
      - SHARD1_URL=http://shard1:8000
      - SHARD2_URL=http://shard2:8000
      - SHARD3_URL=http://shard3:8000
      - SHARD4_URL=http://shard4:8000
    depends_on:
      - shard1
      - shard2
      - shard3
      - shard4

  consumer:
    build:
      context: .
      dockerfile: ./kafka/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - ROUTER_URL=http://router:9000
    depends_on:
      broker:
        condition: service_healthy
      router:
        condition: service_started

  trie-updater:
    build:
      context: .
      dockerfile: ./trie-updates/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=broker:9092
      - ROUTER_URL=http://router:9000
    depends_on:
      broker:
        condition: service_healthy
      router:
        condition: service_started

volumes:
  kafka_data: